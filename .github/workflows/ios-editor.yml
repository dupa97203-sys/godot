name: 🛠️ Build Godot iPadOS Editor (Official Style)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15 # Korzystamy z najnowszego stabilnego środowiska Apple
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # Korzystamy z oficjalnej akcji przywracania cache z repozytorium Godota
      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ios-editor
        continue-on-error: true

      # Korzystamy z oficjalnej akcji instalacji zaleznosci (Python, SCons itp.)
      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Kompilacja silnika jako Edytor na architekture arm64 (procesory iPada)
      # Uzywamy oficjalnej akcji budujacej
      - name: Compilation (arm64)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: dev_mode=no optimize=speed debug_symbols=no arch=arm64 production=no
          platform: ios
          target: editor

      # Zapisujemy cache na przyszlosc, zeby kolejne buildy trwaly chwilke
      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ios-editor
        continue-on-error: true

      # Pakowanie za pomoca projektu Xcode – dokladnie tak, jak wymaga tego iOS
      # Ta metoda wypluje idealna strukture aplikacji
      - name: Link App Executable & Package IPA
        run: |
          cd platform/ios
          xcodebuild -project godot_ios.xcodeproj -scheme godot_ios -configuration Debug -sdk iphoneos DEFAULT_CONFIGURATION=Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO PRODUCT_NAME="GodotEditor"
          
          mkdir -p ../../Payload
          mv build/Debug-iphoneos/GodotEditor.app ../../Payload/
          cd ../../
          zip -r GodotEditor_iPad.ipa Payload

      # Wysylamy gotowy plik .ipa do pobrania
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iPadOS-Editor
          path: GodotEditor_iPad.ipa
