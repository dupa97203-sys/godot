name: 🛠️ Build Godot iPadOS Editor (Official Style)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ios-editor
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Budujemy za pomoca SCons, ale dodajemy flagi vulkan=yes oraz moltenvk=yes.
      # To zmusza SCons do automatycznego podlinkowania brakujacych funkcji graficznych!
      - name: Compilation (arm64)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: dev_mode=no optimize=speed debug_symbols=no arch=arm64 production=no vulkan=yes moltenvk=yes
          platform: ios
          target: editor

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ios-editor
        continue-on-error: true

      - name: Package to IPA
        run: |
          mkdir -p Payload/Godot.app
          
          # Poniewaz poprosilismy o pelny build, SCons powinien wrzucic gotowy plik binarny do bin/
          # Kopiujemy go i zmieniamy nazwe na 'Godot'
          cp bin/godot.ios.editor.*arm64 Payload/Godot.app/Godot || cp bin/godot* Payload/Godot.app/Godot
          
          echo "=== Tworzenie Info.plist ==="
          cat <<EOF > Payload/Godot.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>English</string>
              <key>CFBundleExecutable</key>
              <string>Godot</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.godot.editor</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Godot Editor</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>4.x</string>
              <key>CFBundleSignature</key>
              <string>????</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>2</integer>
              </array>
          </dict>
          </plist>
          EOF
          
          echo "=== Pakowanie do IPA ==="
          zip -r GodotEditor_iPad.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iPadOS-Editor
          path: GodotEditor_iPad.ipa
