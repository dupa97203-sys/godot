name: 🛠️ Build Godot iPadOS Editor (Official Style)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ios-editor
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Compilation (arm64)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: dev_mode=no optimize=speed debug_symbols=no arch=arm64 production=no
          platform: ios
          target: editor

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ios-editor
        continue-on-error: true

      - name: Link App Executable & Package IPA
        run: |
          # Szukamy pliku xcodeproj w calym katalogu platform/ios i podfolderach
          echo "=== Szukanie projektu Xcode ==="
          REAL_PROJ_PATH=$(find platform/ios -name "*.xcodeproj" | head -n 1)
          
          if [ -z "$REAL_PROJ_PATH" ]; then
            echo "BŁĄD: Nie znaleziono żadnego projektu .xcodeproj w platform/ios!"
            echo "Oto struktura katalogu platform/ios:"
            ls -R platform/ios
            exit 1
          fi
          
          echo "Znaleziono projekt w sciezce: $REAL_PROJ_PATH"
          
          # Uruchamiamy xcodebuild bezposrednio na znalezionym projekcie
          xcodebuild -project "$REAL_PROJ_PATH" -scheme godot_ios -configuration Debug -sdk iphoneos DEFAULT_CONFIGURATION=Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO PRODUCT_NAME="GodotEditor"
          
          # Pakowanie do .ipa (szukamy wygenerowanego .app w folderze platform/ios)
          mkdir -p Payload
          APP_PATH=$(find platform/ios -name "GodotEditor.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
             # Sprawdzamy alternatywna lokalizacje buildow Xcode
             APP_PATH=$(find platform/ios/build -name "*.app" -type d | head -n 1)
          fi
          
          echo "Kopiowanie aplikacji z: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r GodotEditor_iPad.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iPadOS-Editor
          path: GodotEditor_iPad.ipa
