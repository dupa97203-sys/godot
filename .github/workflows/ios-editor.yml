name: 🛠️ Build Godot iPadOS Editor (Official Style)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ios-editor
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Compilation (arm64)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: dev_mode=no optimize=speed debug_symbols=no arch=arm64 production=no
          platform: ios
          target: editor

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ios-editor
        continue-on-error: true

      - name: Link App Executable & Package IPA
        run: |
          cd platform/ios
          
          # Automatycznie znajdujemy nazwe projektu Xcode, niewazne czy to godot.xcodeproj czy godot_ios.xcodeproj
          XCODE_PROJ=$(ls -d *.xcodeproj | head -n 1)
          echo "Znaleziono projekt: $XCODE_PROJ"
          
          # Uruchamiamy xcodebuild z dynamicznie dobrana nazwa projektu
          xcodebuild -project "$XCODE_PROJ" -scheme godot_ios -configuration Debug -sdk iphoneos DEFAULT_CONFIGURATION=Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO PRODUCT_NAME="GodotEditor"
          
          # Pakowanie do .ipa
          mkdir -p ../../Payload
          mv build/Debug-iphoneos/GodotEditor.app ../../Payload/
          cd ../../
          zip -r GodotEditor_iPad.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iPadOS-Editor
          path: GodotEditor_iPad.ipa
