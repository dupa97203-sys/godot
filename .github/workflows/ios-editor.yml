name: 🛠️ Build Godot iPadOS Editor

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Set up Python and SCons
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: |
          python -m pip install scons

      - name: Cache SCons builds
        uses: actions/cache@v4
        with:
          path: .scons_cache
          key: ${{ runner.os }}-godot-ios-editor

      - name: Build Godot Editor for iOS
        run: |
          scons platform=ios target=editor arch=arm64 optimize=speed production=no debug_symbols=no scons_cache=.scons_cache

      - name: Link App Executable via Xcode
        run: |
          # Przechodzimy do folderu platformy iOS, gdzie Godot ma gotowy projekt Xcode
          cd platform/ios
          
          # Uruchamiamy xcodebuild, ktory wezmie nasza biblioteke .a i zbuduje z niej prawdziwy program .app
          xcodebuild -project godot_ios.xcodeproj -scheme godot_ios -configuration Debug -sdk iphoneos DEFAULT_CONFIGURATION=Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO SUBTITLE="" PRODUCT_NAME="GodotEditor"
          
          # Przenosimy gotowa aplikacje i pakujemy do .ipa
          mkdir -p ../../Payload
          mv build/Debug-iphoneos/GodotEditor.app ../../Payload/
          cd ../../
          zip -r GodotEditor_iPad.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iPadOS-Editor
          path: GodotEditor_iPad.ipa
