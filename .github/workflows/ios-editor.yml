name: 🔍 Debug Godot Build Folder

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Set up Python and SCons
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: |
          python -m pip install scons

      - name: Cache SCons builds
        uses: actions/cache@v4
        with:
          path: .scons_cache
          key: ${{ runner.os }}-godot-ios-editor

      - name: Build Godot Editor for iOS
        run: |
          # Kontynuujemy kompilację (Scons użyje cache, więc dociągnie tylko to, czego brakuje)
          scons platform=ios target=editor arch=arm64 optimize=speed production=no debug_symbols=no scons_cache=.scons_cache

      - name: Package BIN folder to ZIP
        if: always() # To sprawi, że ZIP zrobi się NAWET JEŚLI kompilacja się wywali!
        run: |
          mkdir -p bin_debug
          if [ -d "bin" ]; then
            cp -r bin/* bin_debug/
          else
            echo "Folder bin NIE ISTNIEJE, tworze pusty plik tekstowy w zamian" > bin_debug/error.txt
          fi
          zip -r ../../Godot_Bin_Folder.zip bin_debug

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Godot-Bin-Output
          path: Godot_Bin_Folder.zip

