name: 🛠️ Godot iPadOS Editor Built

on:
  workflow_dispatch:

jobs:
  ios-editor:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Setup Godot Dependencies
        uses: ./.github/actions/godot-deps

      - name: Restore Cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ios-editor
        continue-on-error: true

      # Budujemy dokładnie tak, jak społeczność – jako target=editor
      - name: Build SCons Libraries
        uses: ./.github/actions/godot-build
        with:
          scons-flags: dev_mode=no optimize=speed debug_symbols=no arch=arm64 production=no vulkan=yes moltenvk=yes
          platform: ios
          target: editor

      - name: Save Cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ios-editor
        continue-on-error: true

      # To jest ten brakujący krok, który robią ludzie w społeczności:
      # Przygotowanie oficjalnego folderu Xcode dystrybuowanego z Godotem
      - name: Prepare Official Xcode Project Template
        run: |
          cd misc/dist/ios_xcode
          # Tworzymy strukturę, której Xcode wymaga, i kopiujemy tam skompilowane biblioteki
          mkdir -p lib
          cp ../../../bin/libgodot.ios.editor.arm64.a lib/libgodot.ios.iphone.a
          cp ../../../platform/ios/libios.ios.editor.arm64.a lib/libios.ios.iphone.a
          
          # Szukamy MoltenVK tam, gdzie SCons go pobrał i wrzucamy do projektu
          MOLTEN_FILE=$(find ../../../thirdparty -name "libMoltenVK.a" | head -n 1)
          if [ -n "$MOLTEN_FILE" ]; then
            cp "$MOLTEN_FILE" lib/
          fi

      # Budowanie prawdziwego projektu przez Xcode, tak jak robi to społeczność
      - name: Compile App via Xcode Template
        run: |
          cd misc/dist/ios_xcode
          xcodebuild -project godot_ios.xcodeproj -scheme godot_ios -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO PRODUCT_NAME="GodotEditor"

      # Pakowanie wszystkiego do jednego pliku .ipa
      - name: Create Unsigned IPA Package
        run: |
          mkdir -p Payload
          # Kopiujemy zbudowaną przez Xcode aplikację
          cp -r misc/dist/ios_xcode/build/Release-iphoneos/GodotEditor.app Payload/
          zip -r GodotEditor_iPad.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iPadOS-Editor
          path: GodotEditor_iPad.ipa
